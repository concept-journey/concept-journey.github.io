title: Concept Journey
description: AI와 개념의 여정
url: "https://concept-journey.github.io"
baseurl: ""

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"

locale: "ko-KR"
name: "concept-journey"

# 빌드 설정
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 플러그인
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# 페이지네이션
paginate: 10
paginate_path: /page:num/

# 기본값
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      show_date: true
      toc: true
      toc_sticky: true
